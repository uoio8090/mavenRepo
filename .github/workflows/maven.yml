# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Java CI with Maven

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    - name: Build with Maven
      run: mvn -B package --file pom.xml

    - name: Get commit author email
      if: failure()
      id: author
      run: echo "EMAIL=$(git log -1 --pretty=format:'%ae')" >> $GITHUB_OUTPUT

    - name: Send email via SES
      if: failure()
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: email-smtp.ap-northeast-2.amazonaws.com
        server_port: 587
        secure: true
        username: ${{ secrets.SES_USERNAME }}
        password: ${{ secrets.SES_PASSWORD }}
        subject: "[CI] Build Failed"
        to: ${{ steps.author.outputs.EMAIL }}
        from: ${{ secrets.SES_FROM_EMAIL }}
        body: |
          Build failed.

          Repository: ${{ github.repository }}
          Commit: ${{ github.sha }}
          Author: ${{ steps.author.outputs.EMAIL }}

          Check logs:
          https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
